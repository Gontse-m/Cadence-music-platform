<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cadence — banner (screenshot mode)</title>
  <style>
    :root {
      --burgundy: #722F37;
      --burgundy-dark: #5C2530;
      --burgundy-darker: #4D1A22;
      --burgundy-pitch: #2A0E12;
      --mustard: #C89B3C;
      --mustard-light: #E5B85A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 1600px; height: 400px; overflow: hidden; }
    html.r3 { height: 533px; }
    body {
      width: 1600px;
      height: 400px;
      overflow: hidden;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      background:
        radial-gradient(ellipse at 18% 40%, rgba(200, 155, 60, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 95% 90%, rgba(200, 155, 60, 0.18) 0%, transparent 60%),
        linear-gradient(135deg, var(--burgundy-darker) 0%, var(--burgundy) 55%, var(--burgundy-pitch) 100%);
      display: flex;
      align-items: center;
      padding: 0 80px;
      gap: 56px;
    }
    body.r3 { height: 533px; }

    .bars {
      position: absolute;
      right: 64px;
      bottom: 56px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      opacity: 0.55;
    }
    .bar {
      width: 6px;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--mustard-light), var(--mustard));
      box-shadow: 0 0 12px rgba(200,155,60,0.6);
    }
    .logo-wrap {
      flex: 0 0 auto;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 24px rgba(200,155,60,0.55)) drop-shadow(0 0 48px rgba(200,155,60,0.35));
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: screen; }
    .copy {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }
    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 900;
      font-size: 110px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow:
        0 0 30px rgba(200,155,60,0.55),
        0 0 60px rgba(200,155,60,0.3),
        0 4px 12px rgba(0,0,0,0.6);
    }
    .tagline {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 600;
      font-size: 30px;
      line-height: 1.2;
      color: rgba(255,255,255,0.95);
      max-width: 820px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }
    .tagline .accent { color: var(--mustard-light); }
    .subtag {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.78);
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mustard);
      box-shadow: 0 0 10px var(--mustard);
    }
  </style>
</head>
<body>
  <div class="logo-wrap"><img src="/logo.png" alt="Cadence logo" /></div>
  <div class="copy">
    <div class="wordmark">Cadence</div>
    <div class="tagline">Music that pays artists <span class="accent">directly.</span></div>
    <div class="subtag">Solana micropayments. First listen free. Every replay pays the artist.</div>
    <div class="badges">
      <span class="badge"><span class="dot"></span>Built on Solana</span>
      <span class="badge"><span class="dot"></span>ElevenLabs AI narration</span>
      <span class="badge"><span class="dot"></span>IPFS-native</span>
    </div>
  </div>
  <div class="bars" id="bars"></div>
  <script>
    const bars = document.getElementById('bars');
    const heights = [22, 38, 64, 90, 50, 110, 76, 42, 88, 60, 30, 96, 72, 46, 28, 84, 54, 36];
    heights.forEach(h => {
      const b = document.createElement('div');
      b.className = 'bar';
      b.style.height = h + 'px';
      bars.appendChild(b);
    });
    const params = new URLSearchParams(location.search);
    const h = params.get('h');
    if (h) {
      document.documentElement.style.height = h + 'px';
      document.body.style.height = h + 'px';
    }
  </script>
</body>
</html>
